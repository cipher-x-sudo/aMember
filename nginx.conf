worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    client_max_body_size 20M;

    upstream php-fpm {
        server 127.0.0.1:9000;
    }

    server {
        listen 8080;
        server_name _;
        root /var/www/html;
        index index.php index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Handle /public/* requests (matches .htaccess: RewriteRule ^public public.php [L])
        location ~ ^/public(/.*)?$ {
            rewrite ^/public(/.*)?$ /public.php last;
        }

        # Handle js.php (matches .htaccess: RewriteRule ^js.php js.php [L])
        location = /js.php {
            fastcgi_pass php-fpm;
            fastcgi_index js.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # Handle /setup/* requests
        location ~ ^/setup(/.*)?$ {
            try_files $uri $uri/ /setup/index.php?$query_string;
        }

        # Static files - serve directly (matches .htaccess exclusion pattern)
        location ~* \.(js|ico|gif|jpg|jpeg|png|css|swf|csv|html|pdf|woff|woff2|ttf|eot|svg|css\.map|js\.map)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # PHP files
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        # Main application routing (matches .htaccess: RewriteRule !\.(extensions)$ index.php)
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }
    }
}

